        // スナップショット管理
        const SNAPSHOT_KEY = 'minpakuDashboardSnapshot';

        function saveSnapshot() {
            const snapshot = {
                timestamp: new Date().toISOString(),
                data: JSON.parse(JSON.stringify(monthsData))
            };
            localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(snapshot));
            closeSnapshotModal();
            alert('✅ スナップショットを保存しました！');
        }

        function getSnapshot() {
            const stored = localStorage.getItem(SNAPSHOT_KEY);
            return stored ? JSON.parse(stored) : null;
        }

        function clearSnapshot() {
            if (confirm('スナップショットを削除しますか？')) {
                localStorage.removeItem(SNAPSHOT_KEY);
                alert('✅ クリアしました。');
                location.reload();
            }
        }

        function openSnapshotModal() {
            document.getElementById('snapshotModal').classList.add('show');
        }

        function closeSnapshotModal() {
            document.getElementById('snapshotModal').classList.remove('show');
        }

        // タブの生成
        function generateTabs() {
            const tabList = document.getElementById('tabList');
            const months = Object.keys(monthsData);
            
            months.forEach((month, index) => {
                const button = document.createElement('button');
                button.className = 'tab-button' + (index === 0 ? ' active' : '');
                button.textContent = monthsData[month].month_display;
                button.onclick = (e) => switchMonth(month, e);
                tabList.appendChild(button);
            });
        }

        // コンテンツの生成
        function generateContent() {
            const contentArea = document.getElementById('contentArea');
            const months = Object.keys(monthsData);
            const snapshot = getSnapshot();
            
            months.forEach((month, index) => {
                const data = monthsData[month];
                const previousData = snapshot ? snapshot.data[month] : null;
                const content = createDashboardContent(month, data, previousData);
                
                const div = document.createElement('div');
                div.id = `content-${month}`;
                div.className = 'content' + (index === 0 ? ' active' : '');
                div.innerHTML = content;
                contentArea.appendChild(div);
                
                if (index === 0) {
                    setTimeout(() => { drawChart(month); }, 100);
                }
            });
        }

        // 月を切り替える
        function switchMonth(month, event) {
            document.querySelectorAll('.content').forEach(el => {
                el.classList.remove('active');
            });

            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            const contentEl = document.getElementById(`content-${month}`);
            if (contentEl) {
                contentEl.classList.add('active');
                setTimeout(() => { drawChart(month); }, 0);
            }

            event.target.classList.add('active');
            window.scrollTo(0, 0);
        }

            const ctx = document.getElementById(`chart-${month}`);

            if (charts[month]) { charts[month].destroy(); }

            charts[month] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['売上', '実受取', 'コミッション', 'クリーニング'],
                    datasets: [
                        {
                            label: '直営',
                            data: [data.direct.sales, data.direct.net, data.direct.commission, data.direct.cleaning],
                            backgroundColor: '#667eea',
                            borderRadius: 6,
                            borderSkipped: false
                        },
                        {
                            label: '代行',
                            data: [data.subcon.sales, data.subcon.net, data.subcon.commission, data.subcon.cleaning],
                            backgroundColor: '#f093fb',
                            borderRadius: 6,
                            borderSkipped: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: { font: { size: 11 }, padding: 12 }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(v) { return '¥' + (v/1000000).toFixed(1) + 'M'; },
                                font: { size: 10 }
                            }
                        },
                        x: {
                            ticks: { font: { size: 10 } }
                        }
                    }
                }
            });
        }

        // 前日比の計算
        function calculateChange(current, previous) {
            if (!previous || previous === 0) return null;
            const diff = current - previous;
            const percentChange = (diff / previous) * 100;
            return {
                diff: diff,
                percent: percentChange,
                isPositive: diff >= 0
            };
        }

        function getPreviousHTML(label, current, previous) {
            if (!previous) {
                return `<div class="kpi-previous"><div class="previous-label">前回: なし</div></div>`;
            }

            const change = calculateChange(current, previous);
            const badgeClass = change.isPositive ? 'positive' : 'negative';
            const changeSign = change.isPositive ? '+' : '';
            
            return `
                <div class="kpi-previous">
                    <div class="previous-label">前回インポート</div>
                    <div class="previous-value">¥${previous.toLocaleString('ja-JP')}</div>
                    <span class="change-badge ${badgeClass}">
                        ${changeSign}¥${Math.abs(change.diff).toLocaleString('ja-JP')} (${changeSign}${change.percent.toFixed(1)}%)
                    </span>
                </div>
            `;
        }

        // ダッシュボードHTMLの生成
        function createDashboardContent(month, data, previousData) {
            const direct = data.direct;
            const subcon = data.subcon;
            const total = data.total;
            const occ = data.occupancy;
            const props = data.properties;

            const directColor = occ.direct >= 50 ? 'high' : (occ.direct >= 30 ? 'medium' : 'low');
            const subconColor = occ.subcon >= 50 ? 'high' : (occ.subcon >= 30 ? 'medium' : 'low');
            const totalColor = occ.total >= 50 ? 'high' : (occ.total >= 30 ? 'medium' : 'low');

            let propsHTML = props.map((prop, idx) => `
                <div class="property-card">
                    <h4>#${idx + 1} ${prop.name}</h4>
                    <div class="property-stat">
                        <span>売上</span>
                        <span class="value">¥${prop.sales.toLocaleString('ja-JP')}</span>
                    </div>
                    <div class="property-stat">
                        <span>実受取</span>
                        <span class="value">¥${prop.net.toLocaleString('ja-JP')}</span>
                    </div>
                    <div class="property-stat">
                        <span>日数</span>
                        <span class="value">${prop.days}日</span>
                    </div>
                </div>
            `).join('');

            return `
                <!-- メインKPI -->
                <div class="dashboard-grid">
                    <div class="kpi-card total">
                        <div class="kpi-label">売上（税抜）</div>
                        <div class="kpi-value">¥${total.sales.toLocaleString('ja-JP')}</div>
                        <div class="kpi-subtext">合計</div>
                        ${getPreviousHTML('売上', total.sales, previousData ? previousData.total.sales : null)}
                    </div>
                    <div class="kpi-card total">
                        <div class="kpi-label">実受取</div>
                        <div class="kpi-value">¥${total.net.toLocaleString('ja-JP')}</div>
                        <div class="kpi-subtext">手取り</div>
                        ${getPreviousHTML('実受取', total.net, previousData ? previousData.total.net : null)}
                    </div>
                    <div class="kpi-card total">
                        <div class="kpi-label">稼働率</div>
                        <div class="kpi-value">${occ.total}%</div>
                        <div class="kpi-subtext">${total.days}日 / ${36 * data.month_days}日</div>
                        ${getPreviousHTML('稼働率', occ.total, previousData ? previousData.occupancy.total : null)}
                    </div>
                    <div class="kpi-card total">
                        <div class="kpi-label">予約件数</div>
                        <div class="kpi-value">${total.count}</div>
                        <div class="kpi-subtext">確認済み</div>
                        ${getPreviousHTML('予約件数', total.count, previousData ? previousData.total.count : null)}
                    </div>
                </div>

                <!-- 直営 vs 代行 比較 -->
                <div class="section">
                    <h2>直営 vs 代行</h2>
                    <div class="comparison-grid">
                        <div class="comparison-box">
                            <h3>直営</h3>
                            <div class="comparison-stats">
                                <div class="stat-item">
                                    <div class="stat-label">売上</div>
                                    <div class="stat-value">¥${direct.sales.toLocaleString('ja-JP')}</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">実受取</div>
                                    <div class="stat-value">¥${direct.net.toLocaleString('ja-JP')}</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">日数</div>
                                    <div class="stat-value">${direct.days}日</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">件数</div>
                                    <div class="stat-value">${direct.count}</div>
                                </div>
                            </div>
                        </div>
                        <div class="comparison-box" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <h3>代行</h3>
                            <div class="comparison-stats">
                                <div class="stat-item">
                                    <div class="stat-label">売上</div>
                                    <div class="stat-value">¥${subcon.sales.toLocaleString('ja-JP')}</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">実受取</div>
                                    <div class="stat-value">¥${subcon.net.toLocaleString('ja-JP')}</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">日数</div>
                                    <div class="stat-value">${subcon.days}日</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">件数</div>
                                    <div class="stat-value">${subcon.count}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <canvas id="chart-${month}"></canvas>
                    </div>
                </div>

                <!-- 稼働率ゲージ -->
                <div class="section">
                    <h2>稼働率分析</h2>
                    <div class="gauge-container">
                        <div class="gauge">
                            <h4>直営</h4>
                            <div class="gauge-circle ${directColor}">
                                <span>${occ.direct}%</span>
                            </div>
                        </div>
                        <div class="gauge">
                            <h4>代行</h4>
                            <div class="gauge-circle ${subconColor}">
                                <span>${occ.subcon}%</span>
                            </div>
                        </div>
                        <div class="gauge">
                            <h4>全体</h4>
                            <div class="gauge-circle ${totalColor}">
                                <span>${occ.total}%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 売上内訳 -->
                <div class="section">
                    <h2>売上内訳 & コスト</h2>
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th style="width: 30%;">項目</th>
                                <th class="amount" style="width: 35%;">直営</th>
                                <th class="amount" style="width: 35%;">代行</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>売上（税抜）</strong></td>
                                <td class="amount"><strong>¥${direct.sales.toLocaleString('ja-JP')}</strong></td>
                                <td class="amount"><strong>¥${subcon.sales.toLocaleString('ja-JP')}</strong></td>
                            </tr>
                            <tr>
                                <td>- コミッション</td>
                                <td class="amount" style="color: #f5576c;">-¥${direct.commission.toLocaleString('ja-JP')}</td>
                                <td class="amount" style="color: #f5576c;">-¥${subcon.commission.toLocaleString('ja-JP')}</td>
                            </tr>
                            <tr>
                                <td>- クリーニング</td>
                                <td class="amount" style="color: #FF9800;">-¥${direct.cleaning.toLocaleString('ja-JP')}</td>
                                <td class="amount" style="color: #FF9800;">-¥${subcon.cleaning.toLocaleString('ja-JP')}</td>
                            </tr>
                            <tr style="background: #f0f0f0; font-weight: bold;">
                                <td><strong>= 実受取</strong></td>
                                <td class="amount" style="color: #4CAF50;"><strong>¥${direct.net.toLocaleString('ja-JP')}</strong></td>
                                <td class="amount" style="color: #4CAF50;"><strong>¥${subcon.net.toLocaleString('ja-JP')}</strong></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 支出分析 -->
                <div class="section">
                    <h2>支出分析</h2>
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th style="width: 30%;">項目</th>
                                <th class="amount" style="width: 70%;">金額（税抜）</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>家賃</strong></td>
                                <td class="amount"><strong>¥${data.expense.rent.toLocaleString('ja-JP')}</strong></td>
                            </tr>
                            <tr>
                                <td>光熱費（電気・ガス・水道）</td>
                                <td class="amount">¥${data.expense.utility.toLocaleString('ja-JP')}</td>
                            </tr>
                            <tr style="background: #f0f0f0; font-weight: bold;">
                                <td><strong>支出合計</strong></td>
                                <td class="amount" style="color: #f5576c;"><strong>-¥${data.expense.total.toLocaleString('ja-JP')}</strong></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 営業利益 -->
                <div class="section">
                    <h2>収支サマリー</h2>
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th style="width: 30%;">項目</th>
                                <th class="amount" style="width: 70%;">金額</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>実受取（売上 - コミッション）</strong></td>
                                <td class="amount"><strong style="color: #4CAF50;">¥${total.net.toLocaleString('ja-JP')}</strong></td>
                            </tr>
                            <tr>
                                <td>- 支出合計</td>
                                <td class="amount" style="color: #f5576c;">-¥${data.expense.total.toLocaleString('ja-JP')}</td>
                            </tr>
                            <tr style="background: linear-gradient(135deg, #4CAF50, #45a049); color: white; font-weight: bold;">
                                <td><strong>営業利益</strong></td>
                                <td class="amount"><strong>¥${data.operating_profit.total.toLocaleString('ja-JP')}</strong></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 物件別ランキング -->
                <div class="section">
                    <h2>物件別ランキング <span class="badge">Top ${props.length}</span></h2>
                    <div class="properties-grid">
                        ${propsHTML}
                    </div>
                </div>
            `;
        }

        // 初期化
        window.addEventListener('load', () => {
            generateTabs();
            generateContent();
            
            // Service Worker を登録（PWA化）
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then((reg) => {
                    console.log('Service Worker 登録成功');
                }).catch((err) => {
                    console.log('Service Worker 登録失敗:', err);
                });
            }
        });
    </script>
</body>
</html>
